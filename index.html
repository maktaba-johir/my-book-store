<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অর্ডার কনফার্ম করুন - রাহবার শপ</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .order-container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; width: 100%; border: 1px solid #1a472a; }
        h2 { color: #1a472a; text-align: center; margin-bottom: 5px; }
        .item-card { background: #e8f5e9; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 15px; font-weight: bold; color: #2e7d32; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #1a472a; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #000; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #msg { display: none; text-align: center; padding: 15px; margin-top: 10px; border-radius: 5px; font-weight: bold; line-height: 1.6; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .payment-notice { font-size: 13px; color: #555; background: #fff3cd; padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #ffc107; }
    </style>
</head>
<body>

<div class="order-container">
    <h2>অর্ডার ফর্ম</h2>
    
    <div class="item-card">
        পণ্য: <span id="prod-name">লোডিং...</span><br>
        মূল্য: <span id="prod-price">৫০</span> টাকা
    </div>

    <div class="payment-notice">
        <b>পেমেন্ট ইনস্ট্রাকশন:</b> বিকাশ/নগদ পার্সোনাল নম্বরে টাকা পাঠিয়ে নিচের ফর্মটি পূরণ করুন।
    </div>

    <form id="submit-to-google-sheet">
        <input type="hidden" name="Product_Name" id="hidden-product">
        <input type="hidden" name="Status" value="Pending">

        <label>আপনার নাম</label>
        <input type="text" name="Name" placeholder="পুরো নাম লিখুন" required>

        <label>আপনার ইমেইল</label>
        <input type="email" name="Email" placeholder="example@gmail.com" required>

        <label>পেমেন্ট মাধ্যম</label>
        <select name="Payment_Method">
            <option value="Bkash">বিকাশ (Bkash)</option>
            <option value="Nagad">নগদ (Nagad)</option>
        </select>

        <label>নম্বরের শেষ ৪ ডিজিট</label>
        <input type="text" name="Last_4_Digits" placeholder="যে নম্বর থেকে টাকা পাঠিয়েছেন" maxlength="4" required>

        <label>ট্রানজেকশন আইডি (TrxID)</label>
        <input type="text" name="TrxID" placeholder="TrxID দিন" required>

        <button type="submit" id="submitBtn">অর্ডার কনফার্ম করুন</button>
    </form>
    
    <div id="msg"></div>
</div>

<script>
    // URL থেকে তথ্য নেওয়া
    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type');
    
    let itemName = "এনায়েতুল্লাহ আলতামাস সমগ্র"; 
    if (type === 'nasim') {
        itemName = "নাসিম হিজাজী সমগ্র";
    }

    document.getElementById('prod-name').innerText = itemName;
    document.getElementById('hidden-product').value = itemName;

    // আপনার নতুন আপডেট করা লিং
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxRdGkt855_9Z06yq4nHBSJTntskJG3_u2jj_4OVxQ0O7boO5-qARjxk7imAmGxJMPN/exec';
    
    const form = document.getElementById('submit-to-google-sheet');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
      e.preventDefault();
      btn.disabled = true;
      btn.innerText = "অর্ডার প্রসেসিং হচ্ছে...";
      
      fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(response => {
            msg.style.display = "block";
            msg.className = "success";
            msg.innerHTML = "আলহামদুলিল্লাহ! অর্ডার সফল হয়েছে। <br> আমরা দ্রুত আপনার ইমেইল চেক করে ফাইল পাঠিয়ে দেব ইনশাআল্লাহ।";
            btn.style.display = "none";
            form.reset();
        })
        .catch(error => {
            btn.disabled = false;
            btn.innerText = "আবার চেষ্টা করুন";
            alert("দুঃখিত! তথ্য জমা দিতে সমস্যা হয়েছে।");
        });
    });
</script>
</body>
</html>
